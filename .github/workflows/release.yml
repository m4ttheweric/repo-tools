name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for git describe

      # ── Setup ────────────────────────────────────────────────────────────────
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      # ── Import Developer ID certificate (skipped if secrets not set) ─────────
      # When present, the CLI gets a stable Dev ID signature so macOS TCC grants
      # (Full Disk Access) survive across releases. Without it, every release
      # invalidates the user's TCC grant and they hit EPERM on ~/Documents/...
      - name: Check signing secrets
        id: signing
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
        run: |
          if [ -n "$CERT_B64" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::Developer ID secrets not configured — falling back to ad-hoc signing (TCC grants will be invalidated on every release)"
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.available == 'true'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/rt-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$APPLE_CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Prepend our keychain so codesign (and rt-tray/build.sh) can find the cert
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')

          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "::error::Developer ID Application certificate not found in imported keychain"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          echo "Found signing identity: $SIGNING_IDENTITY"
          echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          rm -f "$CERT_PATH"

      # ── Build rt binary (arm64 + x64) ────────────────────────────────────────
      - name: Compile rt (arm64)
        run: bun build --compile --target=bun-darwin-arm64 ./cli.ts --outfile rt-arm64 --define RT_VERSION='"${{ github.ref_name }}"'

      - name: Compile rt (x64)
        run: bun build --compile --target=bun-darwin-x64 ./cli.ts --outfile rt-x64 --define RT_VERSION='"${{ github.ref_name }}"'

      # ── Sign rt binaries (must run BEFORE tray build so the embedded daemon
      # carries Bun JIT entitlements baked in by codesign — re-signing later
      # would invalidate the parent bundle's seal). ───────────────────────────
      - name: Sign rt binaries
        run: |
          if [ -n "$SIGNING_IDENTITY" ]; then
            echo "Signing rt binaries with Developer ID: $SIGNING_IDENTITY"
            for bin in rt-arm64 rt-x64; do
              codesign --remove-signature "$bin"
              codesign --force --sign "$SIGNING_IDENTITY" \
                --options runtime --timestamp \
                --entitlements scripts/entitlements.plist "$bin"
            done
          else
            echo "Ad-hoc signing rt binaries (no Dev ID configured)"
            for bin in rt-arm64 rt-x64; do
              codesign --remove-signature "$bin"
              codesign --force --sign - --entitlements scripts/entitlements.plist "$bin"
            done
          fi

      # ── Build rt-tray.app per arch (embeds matching rt as rt-daemon) ────────
      # build.sh reads RT_DAEMON_BIN to copy the daemon into Contents/MacOS,
      # ships LaunchAgent.plist into Contents/Library/LaunchAgents, and signs
      # the bundle.
      - name: Build rt-tray (arm64)
        run: |
          RT_DAEMON_BIN="$(pwd)/rt-arm64" rt-tray/build.sh release
          mv rt-tray/rt-tray.app rt-tray/rt-tray-arm64.app

      - name: Build rt-tray (x64)
        run: |
          RT_DAEMON_BIN="$(pwd)/rt-x64" rt-tray/build.sh release
          mv rt-tray/rt-tray.app rt-tray/rt-tray-x64.app

      # ── Package VS Code extension ────────────────────────────────────────────
      - name: Build extension
        run: |
          cd extensions/vscode/rt-context
          bun install
          bun run package

      # ── Bundle release archives ──────────────────────────────────────────────
      - name: Create release bundles
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VSIX=$(ls extensions/vscode/rt-context/*.vsix | head -1)

          # arm64 bundle
          mkdir -p dist/arm64
          cp rt-arm64 dist/arm64/rt
          chmod +x dist/arm64/rt
          cp -R rt-tray/rt-tray-arm64.app dist/arm64/rt-tray.app
          cp "$VSIX" dist/arm64/rt-context.vsix

          # x64 bundle
          mkdir -p dist/x64
          cp rt-x64 dist/x64/rt
          chmod +x dist/x64/rt
          cp -R rt-tray/rt-tray-x64.app dist/x64/rt-tray.app
          cp "$VSIX" dist/x64/rt-context.vsix

      # ── Notarize rt-tray.app (skipped if notarization secrets not set) ───────
      # Submits the signed .app to Apple's notary service and staples the result
      # so Gatekeeper accepts it offline. Without this, users see "rt-tray
      # cannot be opened because the developer cannot be verified" on first run.
      - name: Check notarization secrets
        id: notary
        if: steps.signing.outputs.available == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_ID_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::Notarization secrets not set — rt-tray.app will trigger Gatekeeper warning on first launch"
          fi

      - name: Notarize and staple rt-tray.app
        if: steps.notary.outputs.available == 'true'
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Notarize the tray app once; copy stapled result into both bundles
          ditto -c -k --keepParent dist/arm64/rt-tray.app "$RUNNER_TEMP/rt-tray.zip"

          xcrun notarytool submit "$RUNNER_TEMP/rt-tray.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the original .app (notarytool checks by hash, not zip path)
          xcrun stapler staple dist/arm64/rt-tray.app
          xcrun stapler validate dist/arm64/rt-tray.app

          # Mirror stapled .app into x64 bundle (it's the same Swift binary, same signature)
          rm -rf dist/x64/rt-tray.app
          cp -R dist/arm64/rt-tray.app dist/x64/rt-tray.app

      - name: Create release tarballs
        run: |
          VERSION="${GITHUB_REF_NAME}"
          tar -czf "rt-darwin-arm64-${VERSION}.tar.gz" -C dist/arm64 .
          tar -czf "rt-darwin-x64-${VERSION}.tar.gz" -C dist/x64 .

      # ── Cleanup signing keychain ─────────────────────────────────────────────
      - name: Cleanup keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      # ── Create GitHub Release ────────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            rt-darwin-arm64-*.tar.gz
            rt-darwin-x64-*.tar.gz

      # ── Update Homebrew formula ──────────────────────────────────────────────
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NUM="${VERSION#v}"
          SHA_ARM=$(shasum -a 256 rt-darwin-arm64-${VERSION}.tar.gz | cut -d' ' -f1)
          SHA_X64=$(shasum -a 256 rt-darwin-x64-${VERSION}.tar.gz | cut -d' ' -f1)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/m4ttheweric/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Formula/rt.rb << FORMULA
          class Rt < Formula
            desc "Developer CLI — branch management, service runner, daemon, notifications"
            homepage "https://github.com/m4ttheweric/repo-tools"
            version "${VERSION_NUM}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/m4ttheweric/repo-tools/releases/download/${VERSION}/rt-darwin-arm64-${VERSION}.tar.gz"
                sha256 "${SHA_ARM}"
              end
              on_intel do
                url "https://github.com/m4ttheweric/repo-tools/releases/download/${VERSION}/rt-darwin-x64-${VERSION}.tar.gz"
                sha256 "${SHA_X64}"
              end
            end

            depends_on :macos
            depends_on "fzf"
            depends_on "tmux"

            def install
              bin.install "rt"
              prefix.install "rt-tray.app"
              prefix.install "rt-context.vsix"
            end

            # No post_install hook: Homebrew runs hooks in a sandbox that can't
            # write to ~/Applications, ~/.rt, or shell rc files. Setup is handled
            # by the binary on first invocation (or via \`rt verify\`).

            def caveats
              <<~EOS
                Complete setup + verify the install:
                  rt verify

                Then configure your API tokens:
                  rt settings linear token
                  rt settings gitlab token
              EOS
            end
          end
          FORMULA

          # Dedent the heredoc (remove leading spaces)
          sed -i '' 's/^          //' Formula/rt.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rt.rb
          git commit -m "rt ${VERSION}"
          git push

  # ── Post-release install test ─────────────────────────────────────────────
  test-install:
    needs: release
    runs-on: macos-latest
    steps:
      - name: Install from tap
        run: |
          brew tap m4ttheweric/tap
          brew install m4ttheweric/tap/rt

      - name: Verify binary
        run: |
          rt --version
          echo "Binary OK: $(rt --version)"

      - name: Run post-install setup
        run: |
          # Run explicitly outside the Homebrew sandbox for full user-env access
          rt --post-install

      - name: Install and start daemon
        run: |
          rt daemon install
          sleep 3

      - name: Verify installation
        run: rt verify --ci

      - name: Smoke test
        run: rt --version

